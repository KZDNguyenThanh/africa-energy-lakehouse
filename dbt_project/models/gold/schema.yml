version: 2

models:
  - name: gold_dim_geography
    description: Kimball geography dimension; one row per (country, region, is_urban, settlement_type).
    columns:
      - name: geography_key
        description: Surrogate key.
        tests:
          - not_null
          - unique
      - name: country
        tests:
          - not_null
      - name: settlement_group
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['urban', 'peri_urban', 'rural', 'other']

  - name: gold_dim_date
    description: Kimball calendar dimension at year grain; one row per survey year (2018-2025).
    columns:
      - name: date_key
        description: Surrogate key.
        tests:
          - not_null
          - unique
      - name: year
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
      - name: sdg7_period
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['baseline', 'recent']

  - name: gold_dim_household
    description: >
      Kimball household dimension with Slowly Changing Dimension (SCD) Type 2 history,
      sourced from the household_snapshot. One row per household version; the current
      version has is_current = true and valid_to is null.
    columns:
      - name: household_sk
        description: Surrogate key; unique per household version.
        tests:
          - not_null
          - unique
      - name: household_key
        description: Natural/business key (= household_id); not unique under SCD2.
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null
      - name: income_group
        tests:
          - accepted_values:
              arguments:
                values: ['very_low', 'low', 'middle', 'high', 'very_high']
      - name: energy_source_category
        tests:
          - accepted_values:
              arguments:
                values: ['grid', 'off_grid', 'none']

  - name: gold_fact_consumption
    description: Central fact table; one row per household-year electricity-consumption observation.
    columns:
      - name: household_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gold_dim_household')
                field: household_key
      - name: geography_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gold_dim_geography')
                field: geography_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gold_dim_date')
                field: date_key
      - name: year
        tests:
          - not_null
      - name: monthly_electricity_kwh
        tests:
          - not_null

  - name: gold_agg_country_year
    description: Pre-aggregated metrics by country x year x scenario x is_urban for the dashboard.
    columns:
      - name: country
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: n_households
        tests:
          - not_null
      - name: access_rate_pct
        tests:
          - not_null

  - name: gold_ml_features
    description: >
      Wide, flat feature table for ML regression. Restricted to electrified households
      with monthly_electricity_kwh > 0.
    columns:
      - name: household_id
        tests:
          - not_null
          - unique
      - name: target_kwh
        description: Regression target (monthly_electricity_kwh, always > 0 here).
        tests:
          - not_null
